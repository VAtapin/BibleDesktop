services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: bible-desktop-app:local
    container_name: bible_desktop_app
    env_file:
      - .env.docker
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-bible_desktop}
      DB_USERNAME: ${POSTGRES_USER:-bible_desktop}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-bible_desktop}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./OLD:/var/www/html/OLD:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  queue:
    image: bible-desktop-app:local
    container_name: bible_desktop_queue
    env_file:
      - .env.docker
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-bible_desktop}
      DB_USERNAME: ${POSTGRES_USER:-bible_desktop}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-bible_desktop}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=90"]
    volumes:
      - ./OLD:/var/www/html/OLD:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: bible_desktop_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bible_desktop}
      POSTGRES_USER: ${POSTGRES_USER:-bible_desktop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bible_desktop}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bible_desktop} -d ${POSTGRES_DB:-bible_desktop}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bible_desktop_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
