services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bible_desktop_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bible_desktop}
      POSTGRES_USER: ${POSTGRES_USER:-bible_desktop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bible_desktop}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bible_desktop} -d ${POSTGRES_DB:-bible_desktop}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bible_desktop_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
